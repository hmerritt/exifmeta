# ──────────────────────────────────────────
# Standard EXIF Properties
# Any valid EXIF tag can be set here.
# ──────────────────────────────────────────
exif:
    # Camera & Lens
    Make: Zenza Bronica
    Model: ETRS
    LensMake: Zenza Bronica
    LensModel: Zenzanon 75mm f/2.8
    FocalLength: 75mm
    MaxApertureValue: 2.8

    # Film / Capture
    ISOSpeedRatings: 250 # ISOSpeedRatings | exif:ISO | exifEX:ISOSpeed
    DateTimeOriginal: "2026-04-28"
    CreateDate: "2026-04-28"
    # 1 = Film Scanner
    # 2 = Reflection Print Scanner
    # 3 = Digital Camera
    FileSource: 1

    # AnalogueData
    # Film
    FilmRoll: 35
    FilmMaker: CineStill Kodak
    FilmName: Kodak Double-X
    FilmFormat: 120
    FilmColor: false
    FilmNegative: true
    # Film Development
    FilmDevelopProcess: B&W
    FilmDeveloper:
    FilmProcessLab: The Darkroom, UK
    FilmProcessDate: 2026-04-30
    FilmScanner: Noritsu

    # Attribution
    Artist: Harry Merritt
    Photographer: Harry Merritt

    # Image Description (note: this gets applied to ALL images)
    ImageDescription:
    UserComment:

# ──────────────────────────────────────────
# Custom Properties
# Anything you like can go here!
# ──────────────────────────────────────────
custom:
    roll: 35
    date: 2026-04-28
    date_end: 2026-04-29
    frame_count: 15
    notable_frames: [5, 9, 15]
    locations: [Wales]

    lenses:
        - make: Zenza Bronica
          model: Zenzanon 75mm f/2.8
          focal_length: 75mm

    scans:
        - lab: true
          frames: []
          scanner: Noritsu
          resolution: 2796x2048

# ──────────────────────────────────────────
# Per Frame/File EXIF Properties
# Use this to set EXIF data for individual files, like ExposureTime, FNumber, or GPS data
# ──────────────────────────────────────────
frames:
    # Frame number (first file when sorted alphabetically, useful when shooting film and files are in-order)
    1:
        - ExposureTime: 1/500
        - FNumber: 2.8
        # 0 = Unknown
        # 1 = Average
        # 2 = Center-weighted average
        # 3 = Spot
        # 4 = Multi-spot
        # 5 = Multi-segment
        # 6 = Partial
        # 255 = Other
        - MeteringMode: 2
        # When setting GPS, all of the following values must be set!
        - GPSLatitude: "51.5074"
        - GPSLatitudeRef: "N"
        - GPSLongitude: "3.1791"
        - GPSLongitudeRef: "W"
        - GPSAltitude: "142"
        - GPSAltitudeRef: 0 # 0 = above sea level
        - GPSMapDatum: "WGS-84"

    # Filename (direct but more verbose)
    "image-file.tif":
        - ExposureTime: 1/250
        - FNumber: 5.6
