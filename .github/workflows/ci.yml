name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate GeoNames database
        run: |
          curl -fsSLO https://download.geonames.org/export/dump/cities1000.zip
          unzip -q cities1000.zip cities1000.txt
          python tools/geonames_to_sqlite.py

      - name: Test GeoNames converter
        run: python -m unittest discover tools

      - name: Build
        run: cargo build --release --locked

      - name: Test
        if: github.event_name == 'pull_request'
        run: cargo test --locked --all-targets

      - name: Generate coverage
        if: github.event_name == 'push'
        run: cargo llvm-cov --locked --all-targets --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Coveralls
        if: github.event_name == 'push'
        uses: coverallsapp/github-action@v2
        with:
          file: lcov.info
          format: lcov
          repo-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
