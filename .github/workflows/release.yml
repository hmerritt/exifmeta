name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release_cross:
    name: Release ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary: exifmeta
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
            binary: exifmeta
          - name: windows-x86_64
            target: x86_64-pc-windows-gnu
            binary: exifmeta.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        id: tag_check
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
          fi

      - name: Install Rust
        if: steps.tag_check.outputs.valid == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: steps.tag_check.outputs.valid == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install release tools
        if: steps.tag_check.outputs.valid == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip upx-ucl zip
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Generate GeoNames database
        if: steps.tag_check.outputs.valid == 'true'
        run: |
          curl -fsSLO https://download.geonames.org/export/dump/cities1000.zip
          unzip -q cities1000.zip cities1000.txt
          python tools/geonames_to_sqlite.py

      - name: Build
        if: steps.tag_check.outputs.valid == 'true'
        env:
          EXIFMETA_SUPPRESS_GIT_DIRTY: "true"
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Compress binary with UPX
        if: steps.tag_check.outputs.valid == 'true'
        run: upx --best --lzma "target/${{ matrix.target }}/release/${{ matrix.binary }}"

      - name: Package artifact
        if: steps.tag_check.outputs.valid == 'true'
        run: |
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          (cd package && zip -9 "../dist/exifmeta-${{ github.ref_name }}-${{ matrix.name }}.zip" "${{ matrix.binary }}")

      - name: Upload release asset
        if: steps.tag_check.outputs.valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.zip

  release_macos:
    name: Release ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-x86_64
            target: x86_64-apple-darwin
          - name: macos-aarch64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        id: tag_check
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
          fi

      - name: Install Rust
        if: steps.tag_check.outputs.valid == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        if: steps.tag_check.outputs.valid == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install release tools
        if: steps.tag_check.outputs.valid == 'true'
        run: brew install upx

      - name: Generate GeoNames database
        if: steps.tag_check.outputs.valid == 'true'
        run: |
          curl -fsSLO https://download.geonames.org/export/dump/cities1000.zip
          unzip -q cities1000.zip cities1000.txt
          python3 tools/geonames_to_sqlite.py

      - name: Build
        if: steps.tag_check.outputs.valid == 'true'
        env:
          EXIFMETA_SUPPRESS_GIT_DIRTY: "true"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Compress binary with UPX
        if: steps.tag_check.outputs.valid == 'true'
        continue-on-error: true
        run: upx --best --lzma --force-macos "target/${{ matrix.target }}/release/exifmeta"

      - name: Package artifact
        if: steps.tag_check.outputs.valid == 'true'
        run: |
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/exifmeta" package/exifmeta
          (cd package && zip -9 "../dist/exifmeta-${{ github.ref_name }}-${{ matrix.name }}.zip" exifmeta)

      - name: Upload release asset
        if: steps.tag_check.outputs.valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.zip
